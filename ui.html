<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      background: #ffffff;
      font-size: 11px;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-weight: 600;
      font-size: 11px;
      color: #000000;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    input[type="text"], textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #e5e5e5;
      border-radius: 4px;
      font-size: 11px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: #18a0fb;
    }

    textarea {
      min-height: 60px;
      resize: vertical;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 6px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .checkbox-label {
      font-weight: 500;
      font-size: 11px;
      cursor: pointer;
      color: #333;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .hint {
      font-size: 10px;
      color: #999;
      font-style: italic;
    }

    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn-primary {
      background: #18a0fb;
      color: white;
    }

    .btn-primary:hover {
      background: #0d8de0;
    }

    .btn-secondary {
      background: #ffffff;
      color: #333;
      border: 1px solid #e5e5e5;
    }

    .btn-secondary:hover {
      background: #f5f5f5;
    }

    .btn-danger {
      background: #f24822;
      color: white;
    }

    .btn-danger:hover {
      background: #d93d1a;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      padding: 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      text-align: center;
      display: none;
    }

    .status.show {
      display: block;
    }

    .status.info {
      background: #e6f4ff;
      color: #0958d9;
      border: 1px solid #91caff;
    }

    .status.success {
      background: #f6ffed;
      color: #389e0d;
      border: 1px solid #b7eb8f;
    }

    .status.warning {
      background: #fffbe6;
      color: #d46b08;
      border: 1px solid #ffe58f;
    }

    .status.error {
      background: #fff1f0;
      color: #cf1322;
      border: 1px solid #ffccc7;
    }

    .preview-section {
      display: none;
      margin-top: 8px;
      padding: 12px;
      background: #fafafa;
      border-radius: 6px;
      border: 1px solid #e5e5e5;
      max-height: 200px;
      overflow-y: auto;
    }

    .preview-section.show {
      display: block;
    }

    .preview-title {
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 11px;
    }

    .preview-item {
      padding: 6px 8px;
      background: white;
      border-radius: 4px;
      margin-bottom: 4px;
      font-size: 10px;
      border: 1px solid #e5e5e5;
    }

    .preview-item .layer-name {
      font-weight: 600;
      color: #18a0fb;
      margin-bottom: 2px;
    }

    .preview-item .text-preview {
      color: #666;
      font-family: monospace;
    }

    .match-highlight {
      background: #fff7e6;
      color: #d46b08;
      padding: 1px 2px;
      border-radius: 2px;
      font-weight: 600;
    }

    .divider {
      height: 1px;
      background: #e5e5e5;
      margin: 8px 0;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
      background: #f5f5f5;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stat-number {
      color: #18a0fb;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="input-group">
      <label>
        🔍 Find
        <span class="hint">(what to search for)</span>
      </label>
      <textarea id="findText" placeholder='e.g., "Hello kitty" or just "kitty"'></textarea>
    </div>

    <div class="input-group">
      <label>
        ✏️ Replace with
        <span class="hint">(new text)</span>
      </label>
      <textarea id="replaceText" placeholder='e.g., "Hello mama" or just "mama"'></textarea>
    </div>

    <div class="options">
      <div class="checkbox-group">
        <input type="checkbox" id="wholeWord" checked>
        <label for="wholeWord" class="checkbox-label">
          🎯 Match whole words only
          <span class="hint">("kitty" won't match "Kitty?")</span>
        </label>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="caseSensitive">
        <label for="caseSensitive" class="checkbox-label">
          Aa Case sensitive
          <span class="hint">("Kitty" ≠ "kitty")</span>
        </label>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="exactPhrase" checked>
        <label for="exactPhrase" class="checkbox-label">
          📝 Match exact phrase
          <span class="hint">(entire search text must match)</span>
        </label>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="selectionOnly">
        <label for="selectionOnly" class="checkbox-label">
          🎨 Search in selection only
          <span class="hint">(only selected layers)</span>
        </label>
      </div>
    </div>

    <div id="status" class="status"></div>

    <div class="button-group">
      <button id="findBtn" class="btn-secondary">🔍 Find Matches</button>
      <button id="replaceAllBtn" class="btn-primary" disabled>Replace All</button>
    </div>

    <div id="previewSection" class="preview-section">
      <div class="preview-title">📋 Preview Matches</div>
      <div id="previewList"></div>
    </div>

    <div class="divider"></div>

    <button id="closeBtn" class="btn-secondary">Close Plugin</button>
  </div>

  <script>
    const findText = document.getElementById('findText');
    const replaceText = document.getElementById('replaceText');
    const wholeWord = document.getElementById('wholeWord');
    const caseSensitive = document.getElementById('caseSensitive');
    const exactPhrase = document.getElementById('exactPhrase');
    const selectionOnly = document.getElementById('selectionOnly');
    const findBtn = document.getElementById('findBtn');
    const replaceAllBtn = document.getElementById('replaceAllBtn');
    const closeBtn = document.getElementById('closeBtn');
    const status = document.getElementById('status');
    const previewSection = document.getElementById('previewSection');
    const previewList = document.getElementById('previewList');

    let currentMatches = [];

    function showStatus(message, type = 'info') {
      status.textContent = message;
      status.className = `status ${type} show`;
      setTimeout(() => {
        status.classList.remove('show');
      }, 3000);
    }

    function updatePreview(matches) {
      if (!matches || matches.length === 0) {
        previewSection.classList.remove('show');
        previewList.innerHTML = '';
        return;
      }

      previewSection.classList.add('show');
      previewList.innerHTML = matches.map(match => `
        <div class="preview-item">
          <div class="layer-name">${match.layerName}</div>
          <div class="text-preview">"${match.preview}"</div>
        </div>
      `).join('');
    }

    findBtn.onclick = () => {
      const find = findText.value.trim();
      
      if (!find) {
        showStatus('⚠️ Please enter text to find', 'warning');
        return;
      }

      parent.postMessage({
        pluginMessage: {
          type: 'find',
          find: find,
          options: {
            wholeWord: wholeWord.checked,
            caseSensitive: caseSensitive.checked,
            exactPhrase: exactPhrase.checked,
            selectionOnly: selectionOnly.checked
          }
        }
      }, '*');

      showStatus('🔍 Searching...', 'info');
      replaceAllBtn.disabled = true;
    };

    replaceAllBtn.onclick = () => {
      const find = findText.value.trim();
      const replace = replaceText.value;

      if (!find) {
        showStatus('⚠️ Please enter text to find', 'warning');
        return;
      }

      if (currentMatches.length === 0) {
        showStatus('⚠️ No matches to replace', 'warning');
        return;
      }

      parent.postMessage({
        pluginMessage: {
          type: 'replace-all',
          find: find,
          replace: replace,
          options: {
            wholeWord: wholeWord.checked,
            caseSensitive: caseSensitive.checked,
            exactPhrase: exactPhrase.checked,
            selectionOnly: selectionOnly.checked
          }
        }
      }, '*');

      showStatus('✏️ Replacing...', 'info');
    };

    closeBtn.onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
    };

    // Listen for messages from the plugin code
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      
      if (msg.type === 'find-results') {
        currentMatches = msg.matches;
        const count = msg.count;

        if (count === 0) {
          showStatus('😕 No matches found', 'warning');
          replaceAllBtn.disabled = true;
          previewSection.classList.remove('show');
        } else {
          showStatus(`✅ Found ${count} match${count !== 1 ? 'es' : ''}`, 'success');
          replaceAllBtn.disabled = false;
          updatePreview(msg.matches);
        }
      } else if (msg.type === 'replace-results') {
        const count = msg.count;
        showStatus(`✅ Replaced ${count} match${count !== 1 ? 'es' : ''}`, 'success');
        currentMatches = [];
        replaceAllBtn.disabled = true;
        previewSection.classList.remove('show');
      } else if (msg.type === 'error') {
        showStatus(`❌ Error: ${msg.message}`, 'error');
      }
    };

    // Auto-disable replace button when search text changes
    findText.addEventListener('input', () => {
      replaceAllBtn.disabled = true;
      previewSection.classList.remove('show');
      currentMatches = [];
    });

    [wholeWord, caseSensitive, exactPhrase, selectionOnly].forEach(checkbox => {
      checkbox.addEventListener('change', () => {
        replaceAllBtn.disabled = true;
        previewSection.classList.remove('show');
        currentMatches = [];
      });
    });
  </script>
</body>
</html>
